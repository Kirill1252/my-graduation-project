{% extends "base.html" %}
{% block content %}
{% load thumbnail %}
{% if courses %}
<div class="container" style="margin-bottom: 50px;">
    <div class="row row-cols-1 row-cols-md-4 g-4 m-auto ">
        {% for items in courses %}
        <div class="col ">
            <div class="card h-75 ">
                <a href="{% url 'courses:course' items.slug %}">
                    <img src="{{ items.cover|thumbnail_url:'cover'}}" class="card-img-top">
                </a>
                <div class="card-body border border-secondary rounded-bottom">
                    <h5 class="card-title">{{ items.name }}</h5>
                    <p class="card-text">{{ items.description }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% else %}
<h5 class="text-center">Courses not yet available</h5>
{% endif %}
{% endblock %}
